# Render Blueprint - Deploy both services
services:
  # Backend API
  - type: web
    name: projeto-alegria-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: free
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: projeto_alegria
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"

  # Frontend
  - type: web
    name: projeto-alegria-web
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    region: oregon
    plan: free
    buildCommand: ""
    envVars:
      - key: REACT_APP_BACKEND_URL
        fromService:
          name: projeto-alegria-api
          type: web
          property: host
